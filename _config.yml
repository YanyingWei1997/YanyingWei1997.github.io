# Site Settings
locale                   : "en-US"
title                    : "Yanying Wei"
title_separator          : "-"
subtitle                 :
name                     : "Yanying Wei"
description              : "Lecturer in Financial Technology at Nanning University. Research on carbon emissions, energy policy, green finance, and regional economics."
url                      : "https://yanyingwei1997.github.io"
baseurl                  : ""
repository               : "YanyingWei1997/YanyingWei1997.github.io"
google_scholar_stats_use_cdn : true

# Google Analytics
google_analytics_id      :

# SEO Related
google_site_verification :
bing_site_verification   :
baidu_site_verification  :

# Site Author
author:
  name             : "Yanying Wei"
  avatar           : "images/yanyingwei3.png"
  bio              : "Nanning University"
  location         : "Nanning, China"
  employer         : "School of Digital Economics, Nanning University"
  pubmed           :
  googlescholar    :
  email            : "weiyanying@unn.edu.cn"
  cv               : "/assets/CV-YanyingWEI.pdf"
  researchgate     :
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "YanyingWei1997"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         :
  dblp             :
  orcid            :
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

languages:
  - en
default_lang: "en"
t:
  en:
    home: "Home"
    about: "About Me"
    news: "News"
    publications: "Publications"
    educations: "Education"
    teaching: "Teaching"
    honors: "Funding & Honors"
    blogs: "Notes"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
