<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="hidden" aria-label="Toggle navigation menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="{{ '/#about-me' | relative_url }}">Homepage</a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url | relative_url }}">{{ link.title }}</a>
            </li>
          {% endfor %}
          <li class="masthead__menu-item masthead__menu-item--lg">
            {% if site.active_lang == 'zh' %}
              <a href="{{ page.url | remove_first: '/zh' }}" style="font-weight: 700; color: var(--accent-color, #e83e8c);"><i class="fas fa-globe"></i> EN</a>
            {% else %}
              <a href="/zh{{ page.url }}" style="font-weight: 700; color: var(--accent-color, #e83e8c);"><i class="fas fa-globe"></i> 中文</a>
            {% endif %}
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
