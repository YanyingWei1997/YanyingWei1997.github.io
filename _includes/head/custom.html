<!-- 强调色增强的JavaScript动效 -->
<script>
// 页面加载后的滚动动画
document.addEventListener('DOMContentLoaded', function() {
  // 滚动触发动画
  const observerOptions = {
    threshold: 0.1,
    rootMargin: '0px 0px -50px 0px'
  };
  
  const observer = new IntersectionObserver(function(entries) {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('animate');
      }
    });
  }, observerOptions);
  
  // 为元素添加动画类
  document.querySelectorAll('.paper-box, .highlight-block').forEach(el => {
    el.classList.add('fade-in-up');
    observer.observe(el);
  });
  
  // 为重要链接添加强调色效果
  document.querySelectorAll('a[href*="pdf"], a[href*="github"], a[href*="arxiv"]').forEach(link => {
    link.classList.add('link-accent');
  });

  // 折叠较长的代表性成果列表
  document.querySelectorAll('.publications-list').forEach(list => {
    const visibleCount = Number(list.dataset.visibleCount || 4);
    const cards = Array.from(list.querySelectorAll(':scope > .paper-box'));

    if (cards.length <= visibleCount) {
      return;
    }

    const moreLabel = list.dataset.moreLabel || 'More';
    const lessLabel = list.dataset.lessLabel || 'Show Less';
    const hiddenCards = cards.slice(visibleCount);
    const buttonWrap = document.createElement('div');
    const button = document.createElement('button');
    const icon = document.createElement('i');
    const label = document.createElement('span');

    buttonWrap.className = 'publications-more-wrap';
    button.className = 'publications-more-btn';
    button.type = 'button';
    button.setAttribute('aria-expanded', 'false');
    icon.className = 'fas fa-chevron-down';
    label.textContent = moreLabel;

    hiddenCards.forEach(card => card.classList.add('publication-hidden'));
    button.append(icon, label);
    buttonWrap.append(button);
    list.after(buttonWrap);

    button.addEventListener('click', () => {
      const expanded = button.getAttribute('aria-expanded') === 'true';
      hiddenCards.forEach(card => card.classList.toggle('publication-hidden', expanded));
      if (!expanded) {
        hiddenCards.forEach(card => card.classList.add('animate'));
      }
      button.setAttribute('aria-expanded', String(!expanded));
      icon.className = expanded ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
      label.textContent = expanded ? moreLabel : lessLabel;

      if (expanded) {
        list.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
});

// 动态添加装饰条
document.addEventListener('DOMContentLoaded', function() {
  const body = document.body;
  body.classList.add('accent-border-top');
});
</script>
