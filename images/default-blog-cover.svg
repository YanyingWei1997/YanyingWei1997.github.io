<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Research Note Cover</title>
  <desc id="desc">A clean research note cover with documents, code, and synthesis nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#012f63" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="26" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="72" y="72" width="576" height="250" rx="22" fill="#fff" stroke="#dbe7f4"/>
  </g>
  <text x="112" y="122" fill="#012f63" font-family="Arial, sans-serif" font-size="27" font-weight="700">Research Note</text>
  <g transform="translate(112 158)">
    <rect x="0" y="0" width="142" height="116" rx="14" fill="#eef6ff" stroke="#7aa6c8" stroke-width="4"/>
    <path d="M28 35 H112 M28 58 H112 M28 81 H84" stroke="#012f63" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g transform="translate(300 154)">
    <rect x="0" y="0" width="148" height="124" rx="14" fill="#fff7f8" stroke="#fe667b" stroke-width="4"/>
    <path d="M44 40 L24 62 L44 84 M104 40 L124 62 L104 84" fill="none" stroke="#012f63" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M82 32 L66 94" stroke="#fe667b" stroke-width="7" stroke-linecap="round"/>
  </g>
  <g transform="translate(496 158)" stroke="#7aa6c8" stroke-width="4">
    <circle cx="48" cy="36" r="23" fill="#fff"/>
    <circle cx="82" cy="88" r="23" fill="#fff"/>
    <circle cx="20" cy="94" r="23" fill="#fff"/>
    <line x1="60" y1="56" x2="72" y2="70"/>
    <line x1="37" y1="82" x2="65" y2="82"/>
  </g>
  <circle cx="544" cy="194" r="10" fill="#fe667b"/>
  <circle cx="578" cy="246" r="10" fill="#fe667b"/>
  <circle cx="516" cy="252" r="10" fill="#fe667b"/>
  <text x="112" y="356" fill="#5b6f86" font-family="Arial, sans-serif" font-size="19">Collect · Score · Synthesize · Write</text>
</svg>
