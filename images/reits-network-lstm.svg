<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Infrastructure REITs Network-LSTM Diagram</title>
  <desc id="desc">A schematic diagram showing urban rail nodes, network links, debt ratio series, and LSTM forecasting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#012f63" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="26" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="46" y="62" width="270" height="220" rx="18" fill="#fff" stroke="#d9e3ef"/>
    <rect x="382" y="62" width="292" height="220" rx="18" fill="#fff" stroke="#d9e3ef"/>
    <rect x="92" y="316" width="536" height="54" rx="16" fill="#fff" stroke="#d9e3ef"/>
  </g>
  <text x="72" y="98" fill="#012f63" font-family="Arial, sans-serif" font-size="22" font-weight="700">Urban Rail Network</text>
  <text x="408" y="98" fill="#012f63" font-family="Arial, sans-serif" font-size="22" font-weight="700">Network-LSTM</text>
  <g stroke="#7aa6c8" stroke-width="8" stroke-linecap="round" opacity=".85">
    <line x1="130" y1="160" x2="220" y2="130"/>
    <line x1="130" y1="160" x2="180" y2="232"/>
    <line x1="220" y1="130" x2="260" y2="205"/>
    <line x1="180" y1="232" x2="260" y2="205"/>
  </g>
  <g fill="#fe667b" stroke="#fff" stroke-width="5">
    <circle cx="130" cy="160" r="20"/>
    <circle cx="220" cy="130" r="20"/>
    <circle cx="180" cy="232" r="20"/>
    <circle cx="260" cy="205" r="20"/>
  </g>
  <path d="M424 224 C460 158, 505 252, 548 172 S628 198, 646 134" fill="none" stroke="#fe667b" stroke-width="7" stroke-linecap="round"/>
  <g fill="#dceaf6" stroke="#7aa6c8" stroke-width="3">
    <rect x="424" y="126" width="44" height="34" rx="8"/>
    <rect x="486" y="154" width="44" height="34" rx="8"/>
    <rect x="548" y="126" width="44" height="34" rx="8"/>
  </g>
  <path d="M470 143 H486 M532 171 H548" stroke="#012f63" stroke-width="3" stroke-dasharray="6 5"/>
  <text x="426" y="262" fill="#5b6f86" font-family="Arial, sans-serif" font-size="17">Debt ratio dynamics</text>
  <text x="122" y="351" fill="#012f63" font-family="Arial, sans-serif" font-size="19" font-weight="700">REITs impact</text>
  <path d="M250 348 H520" stroke="#c9d7e7" stroke-width="6" stroke-linecap="round"/>
  <circle cx="382" cy="348" r="13" fill="#fe667b"/>
  <text x="538" y="354" fill="#012f63" font-family="Arial, sans-serif" font-size="18">Urban rail debt ratios</text>
</svg>
