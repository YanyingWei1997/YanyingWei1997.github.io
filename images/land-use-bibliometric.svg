<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Land Use Bibliometric Diagram</title>
  <desc id="desc">A schematic map, timeline, keyword network, and trend frontier chart for land use change research.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#eef5f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#012f63" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="26" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="54" y="62" width="258" height="254" rx="18" fill="#fff" stroke="#d9e6dc"/>
    <rect x="358" y="62" width="308" height="254" rx="18" fill="#fff" stroke="#d9e6dc"/>
  </g>
  <text x="82" y="100" fill="#012f63" font-family="Arial, sans-serif" font-size="22" font-weight="700">Land Use Change</text>
  <path d="M120 170 C145 112, 220 118, 246 164 C276 217, 238 270, 180 268 C128 266, 94 222, 120 170Z" fill="#cce8d2" stroke="#6aa977" stroke-width="4"/>
  <path d="M150 174 L198 148 L240 184 L224 238 L162 242 Z" fill="#eef7d8" stroke="#9cb35f" stroke-width="3"/>
  <path d="M104 306 H620" stroke="#d6e1eb" stroke-width="6" stroke-linecap="round"/>
  <g fill="#fe667b">
    <circle cx="128" cy="306" r="9"/>
    <circle cx="246" cy="306" r="9"/>
    <circle cx="364" cy="306" r="9"/>
    <circle cx="482" cy="306" r="9"/>
    <circle cx="600" cy="306" r="9"/>
  </g>
  <text x="96" y="342" fill="#5b6f86" font-family="Arial, sans-serif" font-size="16">1990</text>
  <text x="570" y="342" fill="#5b6f86" font-family="Arial, sans-serif" font-size="16">2020</text>
  <text x="388" y="100" fill="#012f63" font-family="Arial, sans-serif" font-size="22" font-weight="700">WoS Keyword Network</text>
  <g stroke="#8eb4d2" stroke-width="3" opacity=".85">
    <line x1="488" y1="170" x2="428" y2="210"/>
    <line x1="488" y1="170" x2="548" y2="214"/>
    <line x1="488" y1="170" x2="508" y2="252"/>
    <line x1="428" y1="210" x2="508" y2="252"/>
    <line x1="548" y1="214" x2="508" y2="252"/>
  </g>
  <g fill="#fff" stroke-width="4">
    <circle cx="488" cy="170" r="34" stroke="#fe667b"/>
    <circle cx="428" cy="210" r="24" stroke="#7aa6c8"/>
    <circle cx="548" cy="214" r="24" stroke="#7aa6c8"/>
    <circle cx="508" cy="252" r="24" stroke="#7aa6c8"/>
  </g>
  <text x="462" y="176" fill="#012f63" font-family="Arial, sans-serif" font-size="14" font-weight="700">LUCC</text>
  <text x="408" y="215" fill="#012f63" font-family="Arial, sans-serif" font-size="12">GIS</text>
  <text x="531" y="219" fill="#012f63" font-family="Arial, sans-serif" font-size="12">Policy</text>
  <text x="486" y="257" fill="#012f63" font-family="Arial, sans-serif" font-size="12">Trend</text>
</svg>
