<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Land Use Bibliometric Diagram</title>
  <desc id="desc">Simplified map, keyword network, and timeline for land use change research.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#eef5f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#012f63" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="720" height="420" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="60" y="102" width="600" height="230" rx="22" fill="#fff" stroke="#d9e6dc"/>
  </g>
  <path d="M116 208 C144 140, 232 144, 262 202 C292 262, 246 314, 180 306 C126 300, 88 254, 116 208Z" fill="#cce8d2" stroke="#6aa977" stroke-width="5"/>
  <path d="M152 210 L202 178 L252 218 L230 280 L164 278 Z" fill="#eef7d8" stroke="#9cb35f" stroke-width="4"/>
  <g transform="translate(404 148)" stroke="#8eb4d2" stroke-width="4" opacity=".9">
    <line x1="86" y1="52" x2="28" y2="92"/>
    <line x1="86" y1="52" x2="148" y2="96"/>
    <line x1="86" y1="52" x2="106" y2="138"/>
    <line x1="28" y1="92" x2="106" y2="138"/>
    <line x1="148" y1="96" x2="106" y2="138"/>
  </g>
  <g transform="translate(404 148)" fill="#fff" stroke-width="5">
    <circle cx="86" cy="52" r="36" stroke="#fe667b"/>
    <circle cx="28" cy="92" r="24" stroke="#7aa6c8"/>
    <circle cx="148" cy="96" r="24" stroke="#7aa6c8"/>
    <circle cx="106" cy="138" r="24" stroke="#7aa6c8"/>
  </g>
  <path d="M112 350 H608" stroke="#d6e1eb" stroke-width="8" stroke-linecap="round"/>
  <g fill="#fe667b">
